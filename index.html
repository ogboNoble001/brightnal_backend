<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brightnal Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; padding: 24px; background: #f5f5f5; }
    h2 { margin-bottom: 16px; }
    #productSection {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 32px;
      max-width: 600px;
    }
    #uploadForm input,
    #uploadForm textarea {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    #uploadForm textarea { resize: vertical; min-height: 80px; }
    #uploadForm button[type="submit"] {
      background: #333;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    #cancelUpdateBtn {
      background: #aaa;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-left: 8px;
      display: none;
    }
    #message { margin-top: 12px; font-size: 14px; min-height: 20px; }
    .product-list { margin-top: 8px; }
    .product {
      border: 1px solid #ddd;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      gap: 16px;
      align-items: center;
      background: white;
      border-radius: 6px;
    }
    .product img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .product-info { flex: 1; font-size: 14px; line-height: 1.6; }
    .product-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .update-btn {
      background: #2196F3;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
    }
    .delete-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="productSection">
    <h2 id="formTitle">Upload Product</h2>
    <form id="uploadForm">
      <input type="text"   id="productName"  name="productName"  placeholder="Product Name *" required />
      <input type="text"   id="category"     name="category"     placeholder="Category" />
      <input type="text"   id="brand"        name="brand"        placeholder="Brand" />
      <input type="number" id="price"        name="price"        placeholder="Price (₦)" step="0.01" min="0" />
      <input type="number" id="stock"        name="stock"        placeholder="Stock" min="0" />
      <input type="text"   id="sku"          name="sku"          placeholder="SKU" />
      <input type="text"   id="productClass" name="productClass" placeholder="Product Class" />
      <input type="text"   id="sizes"        name="sizes"        placeholder="Sizes (e.g. S, M, L)" />
      <input type="text"   id="colors"       name="colors"       placeholder="Colors" />
      <textarea id="description" name="description" placeholder="Description"></textarea>
      <input type="file" id="imageInput" name="image" accept="image/*" />
      <div style="margin-top: 4px;">
        <button type="submit" id="submitBtn">Upload Product</button>
        <button type="button" id="cancelUpdateBtn">Cancel</button>
      </div>
    </form>
    <div id="message"></div>
  </div>

  <hr style="margin-bottom: 24px;" />

  <h2>Products</h2>
  <button id="loadProductsBtn" style="
    margin-bottom: 16px; padding: 8px 20px;
    background: #333; color: white;
    border: none; border-radius: 4px;
    cursor: pointer; font-size: 14px;
  ">Load Products</button>

  <div class="product-list" id="productList"></div>

  <script src="main.js"></script>
</body>
</html>
